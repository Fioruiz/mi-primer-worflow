name: Demo Secrets

on:
  push:
    branches: [main]

jobs:
  demo:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ vars.APP_ENV }}
      TOKEN: ${{ secrets.MI_TOKEN_SECRETO }}

    steps:
      - uses: actions/checkout@v4

      - name: Mostrar variables de entorno
        run: |
          echo "Ambiente: $ENVIRONMENT"
          echo "Token: $TOKEN"
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"

      - name: Usar secret en un comando
        run: |
          echo "Llamando API con token..."
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://httpbin.org/bearer || true

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Desplegar en staging
        run: echo "Desplegando en staging..."